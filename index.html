<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlphaSignals.ai | Professional Trading Intelligence Terminal</title>
    <style>
        :root {
            --bg-color: #060913;
            --container-bg: #0d1222;
            --accent-color: #00e676; 
            --text-main: #ffffff;
            --text-muted: #64748b;
            --border-color: #1e293b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        .header-section {
            text-align: center;
            max-width: 700px;
            margin: 0 auto 30px auto;
            background: var(--container-bg);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }
        .badge {
            background: rgba(0, 230, 118, 0.1);
            color: var(--accent-color);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 12px;
        }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        h1 span { color: var(--accent-color); }
        p { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 15px; }
        form {
            background: #060913;
            padding: 6px;
            border-radius: 30px;
            border: 1px solid var(--border-color);
            display: flex;
            width: 100%;
        }
        input[type="email"] {
            flex: 2;
            background: transparent;
            border: none;
            padding: 10px 15px;
            color: white;
            font-size: 0.9rem;
            outline: none;
        }
        button {
            flex: 1;
            background: var(--accent-color);
            color: #060913;
            border: none;
            padding: 10px 20px;
            font-size: 0.9rem;
            font-weight: 700;
            border-radius: 25px;
            cursor: pointer;
        }
        /* Trading Terminal Styling */
        .terminal-container {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--container-bg);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            padding: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }
        .terminal-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .live-dot {
            width: 8px;
            height: 8px;
            background-color: #ff3d00;
            border-radius: 50%;
            animation: blink 1.5s infinite;
        }
        #tradingview_widget {
            height: 550px;
            width: 100%;
            border-radius: 8px;
            overflow: hidden;
        }
        @keyframes blink {
            0% { opacity: 0.2; }
            50% { opacity: 1; }
            100% { opacity: 0.2; }
        }
        @media (max-width: 768px) {
            #tradingview_widget { height: 400px; }
        }
    </style>
</head>
<body>

    <div class="header-section">
        <div class="badge">PRO QUANT TERMINAL v2.0</div>
        <h1>AlphaSignals <span>Intelligence</span> Hub</h1>
        <p>Real-time machine-learning technical analysis, automated target hunting, and predictive indicators.</p>
        
        <!-- نظام التقاط الإيميلات الجاهز -->
        <form action="https://formspree.io/f/xpqewykp" method="POST">
            <input type="email" name="email" placeholder="Enter your business email for premium signals..." required>
            <button type="submit">Unlock Full Engine</button>
        </form>
    </div>

    <!-- شاشة الـ TradingView الذكية داخل موقعك -->
    <div class="terminal-container">
        <div class="terminal-title">
            <div class="live-dot"></div>
            <span>AlphaSignals Pro Live Institutional Terminal</span>
        </div>
        
        <!-- محرك الخرائط المتقدم من TradingView -->
        <div id="tradingview_widget"></div>
    </div>

    <!-- تحميل مكتبة الـ Widget الرسمية -->
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
        new TradingView.widget({
            "width": "100%",
            "height": "100%",
            "symbol": "BINANCE:BTCUSDT",
            "interval": "15",
            "timezone": "Etc/UTC",
            "theme": "dark",
            "style": "1",
            "locale": "en",
            "toolbar_bg": "#f1f3f6",
            "enable_publishing": false,
            "hide_side_toolbar": false,
            "allow_symbol_change": true,
            "container_id": "tradingview_widget",
            "studies": [
                "RSI@tv-basicstudies",
                "MACD@tv-basicstudies"
            ]
        });
    </script>

</body>
</html>
