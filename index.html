<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AlphaSignals.ai | Professional Quantum Terminal</title>
    <style>
        :root {
            --bg-color: #060913;
            --container-bg: #0d1222;
            --accent-color: #00e676; 
            --text-main: #ffffff;
            --text-muted: #64748b;
            --border-color: #1e293b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* 1. تصميم الصفحة الرئيسية البسيطة الفخمة */
        .landing-page {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            padding: 20px;
            text-align: center;
            position: absolute;
            z-index: 10;
            background-color: var(--bg-color);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        .badge {
            background: rgba(0, 230, 118, 0.1);
            color: var(--accent-color);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }
        h1 { font-size: 2.5rem; margin-bottom: 15px; font-weight: 700; }
        h1 span { color: var(--accent-color); }
        p { color: var(--text-muted); font-size: 1.1rem; max-width: 600px; margin-bottom: 30px; line-height: 1.6; }
        
        /* فورم التسجيل والأزرار */
        .cta-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        form {
            background: var(--container-bg);
            padding: 6px;
            border-radius: 30px;
            border: 1px solid var(--border-color);
            display: flex;
            width: 100%;
        }
        input[type="email"] {
            flex: 2;
            background: transparent;
            border: none;
            padding: 12px 20px;
            color: white;
            font-size: 0.95rem;
            outline: none;
        }
        .btn-submit {
            background: var(--accent-color);
            color: #060913;
            border: none;
            padding: 12px 25px;
            font-size: 0.95rem;
            font-weight: 700;
            border-radius: 25px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-submit:hover { opacity: 0.9; }
        
        /* زر الدخول المباشر للشارت */
        .btn-terminal {
            background: transparent;
            border: 1px solid var(--border-color);
            color: white;
            padding: 14px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-terminal:hover {
            background: white;
            color: #060913;
        }

        /* 2. تصميم شاشة الشارت الكاملة المخفية */
        .terminal-fullscreen {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
    </style>
</head>
<body>

    <div class="landing-page" id="landing-screen">
        <div class="badge">QUANT ALGORITHMIC TERMINAL v9.0</div>
        <h1>AlphaSignals <span>Intelligence</span></h1>
        <p>Institutional-grade predictive market models and real-time algorithmic signals. Search thousands of digital assets dynamically.</p>
        
        <div class="cta-container">
            <form action="https://formspree.io/f/xpqewykp" method="POST">
                <input type="email" name="email" placeholder="Enter your business email for daily alpha..." required>
                <button type="submit" class="btn-submit">Subscribe</button>
            </form>
            
            <button class="btn-terminal" onclick="openTerminal()">Enter Pro Terminal →</button>
        </div>
    </div>

    <div class="terminal-fullscreen" id="terminal-screen">
        <div id="alphasignals_clean_terminal" style="width: 100%; height: 100%;"></div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
        // دالة سحرية للتنقل السلس والراقي بين صفحة الشرح والشارت
        function openTerminal() {
            document.getElementById("landing-screen").style.opacity = "0";
            setTimeout(function() {
                document.getElementById("landing-screen").style.display = "none";
                var term = document.getElementById("terminal-screen");
                term.style.visibility = "visible";
                term.style.opacity = "1";
                // تحميل الشارت النظيف فوراً بمجرد الدخول
                loadCleanChart();
            }, 500);
        }

        // محرك بناء الشارت النظيف والمفرغ تماماً من الأدوات المزعجة
        function loadCleanChart() {
            new TradingView.widget({
                "autosize": true,
                "symbol": "BINANCE:BTCUSDT",
                "interval": "15",
                "timezone": "Etc/UTC",
                "theme": "dark",
                "style": "1",
                "locale": "en",
                "toolbar_bg": "#f1f3f6",
                "enable_publishing": false,
                "withdaterange": true,
                "hide_side_toolbar": false, // ترك أدوات الرسم الفنية للمستخدم
                "allow_symbol_change": true, // محرك بحث منسدل عن آلاف العملات
                "details": false, // تم إزالة القائمة العمودية اليمنى تماماً بناءً على طلبك
                "hotlist": false, // إزالة القوائم الجانبية الأخرى لتوسيع المساحة
                "calendar": false,
                "container_id": "alphasignals_clean_terminal",
                "studies": [] // تم مسح المؤشرات القديمة ليصبح الشارت نقياً وضخماً 100%
            });
        }
    </script>

</body>
</html>
