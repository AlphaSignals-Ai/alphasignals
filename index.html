<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AlphaSignals.ai | Professional Quantum Terminal</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #060913;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        /* تصميم الحاوية لتأخذ الشاشة كاملة 100% وتمنع انضغاط الشارت نهائياً */
        .terminal-fullscreen {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
        }
    </style>
</head>
<body>

    <div class="terminal-fullscreen">
        <div id="alphasignals_advanced_terminal" style="width: 100%; height: 100%;"></div>
    </div>

    <form id="hidden-waitlist" action="https://formspree.io/f/xpqewykp" method="POST" style="display: none;">
        <input type="email" name="email" id="hidden-email">
    </form>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
        new TradingView.widget({
            "autosize": true, // الشارت يتمدد تلقائياً ليملأ الشاشة بالكامل ويمنع أي ضغط
            "symbol": "BINANCE:BTCUSDT", // العملة الافتراضية عند الفتح
            "interval": "15", // الفاصل الزمني الافتراضي 15 دقيقة للسكالبينج
            "timezone": "Etc/UTC",
            "theme": "dark", // الثيم الليلي الفخم
            "style": "1", // شموع يابانية احترافية
            "locale": "en",
            "toolbar_bg": "#f1f3f6",
            "enable_publishing": false,
            "withdaterange": true,
            "hide_side_toolbar": false, // إظهار شريط الأدوات الجانبي الكامل للرسم والتحليل
            "allow_symbol_change": true, // تفعيل محرك البحث العالمي الحقيقي عن آلاف العملات
            "details": true, // إظهار بيانات أسعار العملة المختارة بدقة مليمترية لايف بالجانب
            "hotlist": true, // إظهار قائمة العملات الأكثر صعوداً وهبوطاً بلحظتها
            "calendar": true,
            "container_id": "alphasignals_advanced_terminal",
            
            // دمج مؤشرات الزخم والدخول والخروج الرياضية (RSI + MACD) تلقائياً داخل الشارت لأي عملة يبحث عنها المستخدم!
            "studies": [
                "RSI@tv-basicstudies",
                "MACD@tv-basicstudies"
            ]
        });
    </script>

</body>
</html>
