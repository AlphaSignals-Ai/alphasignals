<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlphaSignals.ai | Institution-Grade Trading Intelligence</title>
    <style>
        :root {
            --bg-color: #090d16;
            --container-bg: #111726;
            --accent-color: #00e676; /* Green for profit/trading */
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --border-color: #1f293d;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: block;
            padding: 60px 20px;
            text-align: center;
        }
        .container {
            max-width: 650px;
            margin: 0 auto;
            background: var(--container-bg);
            padding: 40px 30px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .badge {
            background: rgba(0, 230, 118, 0.1);
            color: var(--accent-color);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }
        h1 {
            font-size: 2.2rem;
            line-height: 1.3;
            margin-bottom: 15px;
            font-weight: 700;
        }
        h1 span { color: var(--accent-color); }
        p {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 35px;
            line-height: 1.6;
        }
        form {
            background: #090d16;
            padding: 8px;
            border-radius: 30px;
            border: 1px solid var(--border-color);
            display: table;
            width: 100%;
            margin-bottom: 25px;
        }
        input[type="email"] {
            display: table-cell;
            width: 70%;
            background: transparent;
            border: none;
            padding: 12px 20px;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        button {
            display: table-cell;
            width: 30%;
            background: var(--accent-color);
            color: #090d16;
            border: none;
            padding: 14px 24px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        button:hover {
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(0, 230, 118, 0.4);
        }
        .footer-note {
            font-size: 0.85rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="badge">EUROPEAN PRIVATE ALPHA</div>
        <h1>Outperform the Markets with <span>AI-Driven</span> Data</h1>
        <p>Get institution-grade quantitative signals, sentiment metrics, and custom TradingView indicators. 100% Free for early adopters.</p>
        
        <form action="https://formspree.io/f/xpqewykp" method="POST">
            <input type="email" name="email" placeholder="Enter your European trading email..." required>
            <button type="submit">Join Waitlist</button>
        </form>

        <div class="footer-note">🔒 Zero Spam. Unsubscribe anytime. Powered by AlphaSignals AI.</div>
    </div>

</body>
</html>
