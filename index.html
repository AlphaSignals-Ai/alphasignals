<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AlphaSignals.ai | Ultimate Quantum Terminal</title>
    <style>
        :root {
            --bg-color: #060913;
            --container-bg: #0d1222;
            --accent-color: #00e676; 
            --text-main: #ffffff;
            --text-muted: #64748b;
            --border-color: #1e293b;
            --nav-height: 65px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* 1. تصميم الشريط العلوي الثابت الفخم */
        .top-navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--nav-height);
            background: var(--container-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            z-index: 100;
        }
        .nav-logo {
            font-size: 1.25rem;
            font-weight: 700;
            cursor: pointer;
        }
        .nav-logo span {
            color: var(--accent-color);
        }
        .nav-links {
            display: flex;
            gap: 15px;
        }
        .nav-item {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-muted);
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .nav-item:hover, .nav-item.active {
            color: var(--text-main);
            border-color: var(--border-color);
            background: #060913;
        }
        .nav-item.active {
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        /* حاضنة المحتوى العام تحت النوافذ */
        .content-wrapper {
            margin-top: var(--nav-height);
            width: 100%;
            height: calc(100% - var(--nav-height));
            position: relative;
        }

        /* 2. تصميم الصفحة الرئيسية (الشرح والتسجيل) */
        .landing-page {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            padding: 20px;
            text-align: center;
            position: absolute;
            background-color: var(--bg-color);
            z-index: 10;
        }
        .badge {
            background: rgba(0, 230, 118, 0.1);
            color: var(--accent-color);
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 15px;
        }
        h1 { font-size: 2.3rem; margin-bottom: 15px; font-weight: 700; }
        h1 span { color: var(--accent-color); }
        p { color: var(--text-muted); font-size: 1rem; max-width: 580px; margin-bottom: 25px; line-height: 1.6; }
        
        form {
            background: var(--container-bg);
            padding: 6px;
            border-radius: 30px;
            border: 1px solid var(--border-color);
            display: flex;
            width: 100%;
            max-width: 480px;
        }
        input[type="email"] {
            flex: 2;
            background: transparent;
            border: none;
            padding: 10px 15px;
            color: white;
            font-size: 0.9rem;
            outline: none;
        }
        .btn-submit {
            background: var(--accent-color);
            color: #060913;
            border: none;
            padding: 10px 22px;
            font-size: 0.9rem;
            font-weight: 700;
            border-radius: 25px;
            cursor: pointer;
        }

        /* 3. حاوية الشارت المتوسطة المنظمة */
        .terminal-container {
            width: 100%;
            height: 100%;
            position: absolute;
            background-color: var(--bg-color);
            padding: 15px;
            display: none; /* مخفي افتراضياً حتى يضغط المستخدم على الزر */
            z-index: 5;
        }
        .widget-wrapper {
            width: 100%;
            height: 100%;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        @media (max-width: 768px) {
            .top-navbar { padding: 0 15px; }
            .nav-logo { font-size: 1.1rem; }
            .nav-item { padding: 6px 10px; font-size: 0.8rem; }
            h1 { font-size: 1.6rem; }
            form { flex-direction: column; border-radius: 12px; padding: 10px; }
            input[type="email"] { background: #060913; border-radius: 8px; margin-bottom: 8px; padding: 12px; }
            .btn-submit { border-radius: 8px; padding: 12px; }
            .terminal-container { padding: 8px; }
        }
    </style>
</head>
<body>

    <div class="top-navbar">
        <div class="nav-logo" onclick="showScreen('home', this)">AlphaSignals<span>.ai</span></div>
        <div class="nav-links">
            <button class="nav-item active" onclick="showScreen('home', this)">Home</button>
            <button class="nav-item" onclick="showScreen('terminal', this)">Pro Terminal</button>
            <button class="nav-item" onclick="alert('AI Signals Hub is tuning parameters... Accessing VIP list shortly.')">AI Signals</button>
            <button class="nav-item" onclick="alert('Pricing Tiers coming soon in next sprint.')">Pricing</button>
        </div>
    </div>

    <div class="content-wrapper">
        
        <div class="landing-page" id="screen-home">
            <div class="badge">QUANT ALGORITHMIC HUB v10.0</div>
            <h1>Automated <span>Market</span> Terminal</h1>
            <p>Access high-fidelity data feeds and customized predictive scripting frameworks directly on-chain.</p>
            
            <form action="https://formspree.io/f/xpqewykp" method="POST">
                <input type="email" name="email" placeholder="Enter email to synchronize indicators..." required>
                <button type="submit" class="btn-submit">Subscribe</button>
            </form>
        </div>

        <div class="terminal-container" id="screen-terminal">
            <div class="widget-wrapper">
                <div id="alphasignals_clean_terminal" style="width: 100%; height: 100%;"></div>
            </div>
        </div>

    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
        // محرك التنقل التلقائي الذكي بين القوائم بدون تحميل أو تشتيت للعميل
        function showScreen(screenType, btnElement) {
            // إخفاء النوافذ أولاً
            document.getElementById("screen-home").style.display = "none";
            document.getElementById("screen-terminal").style.display = "none";
            
            // إلغاء تفعيل الأزرار القديمة وتفعيل الزر الجديد المضغوط
            var items = document.getElementsByClassName("nav-item");
            for (var i = 0; i < items.length; i++) {
                items[i].classList.remove("active");
            }
            btnElement.classList.add("active");

            // إظهار النافذة المطلوبة فوراً
            if (screenType === 'home') {
                document.getElementById("screen-home").style.display = "flex";
            } else if (screenType === 'terminal') {
                document.getElementById("screen-terminal").style.display = "block";
                // تحميل الشارت النظيف المفرغ لآلاف العملات بمساحته الواسعة الفخمة
                loadStableChart();
            }
        }

        // دالة بناء شاشات الشارت النظيف الشامل لآلاف العملات
        function loadStableChart() {
            new TradingView.widget({
                "autosize": true,
                "symbol": "BINANCE:BTCUSDT",
                "interval": "15",
                "timezone": "Etc/UTC",
                "theme": "dark",
                "style": "1",
                "locale": "en",
                "toolbar_bg": "#f1f3f6",
                "enable_publishing": false,
                "withdaterange": true,
                "hide_side_toolbar": false, // ترك أدوات الرسم الفنية للمتداولين الأوروبيين
                "allow_symbol_change": true, // محرك بحث منسدل متقدم عن آلاف العملات لايف وحصرياً
                "details": false, // إزالة الشريط الجانبي المزدحم لفتح مساحة الرؤية للشموع
                "hotlist": false,
                "calendar": false,
                "container_id": "alphasignals_clean_terminal",
                "studies": [] // شارت مفرغ وفسيح جاهز لاستقبال تحليلات المستخدم
            });
        }
    </script>

</body>
</html>
