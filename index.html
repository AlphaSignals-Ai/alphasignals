<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlphaSignals.ai | Ultimate Exchange Terminal</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://s3.tradingview.com/tv.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="logo">AlphaSignals<span>.ai</span></div>
        <div class="nav-links">
            <a href="#" onclick="handleNav('home')">Home</a>
            <a href="#" onclick="handleNav('terminal')">Terminal</a>
            <a href="#" onclick="handleNav('signals')">Signals</a>
            <a href="#" onclick="handleNav('pricing')">Pricing</a>
        </div>
    </nav>

    <div class="ticker-bar">
        <div class="ticker-track" id="live-ticker-track">Connecting to Live Exchange Feeds...</div>
    </div>

    <section class="hero" id="home-section">
        <div class="search-trigger-container" id="terminal-section">
            <button class="search-trigger-btn" onclick="openSearchModal()">
                <div class="search-btn-left">
                    <span class="search-icon">🔍</span>
                    <span id="current-search-display">BTC / USDT</span>
                </div>
                <div class="search-btn-right">
                    <span class="pulse-dot" id="live-dot" style="display:none;"></span>
                    <span class="shortcut-key">Select Market</span>
                </div>
            </button>
        </div>

        <div class="chart-wrapper">
            <div id="tv-home-chart" class="chart"></div>
            
            <div id="ai-scanner" class="scanner-line" style="display:none;"></div>
            <div id="ai-scanning-text" class="scanning-text" style="display:none;">AI Scanning Orderbook...</div>

            <div id="prediction-path" class="prediction-box" style="display:none;">
                <svg viewBox="0 0 100 100" class="pred-svg">
                    <path id="svg-proj-line" d="M0,50 Q50,50 100,10" fill="none" stroke="#00e676" stroke-width="3" stroke-dasharray="8,8" class="moving-path"/>
                </svg>
            </div>
        </div>

        <div class="sleek-order-bar" id="sleek-order-bar" style="display:none;">
            <div class="slim-bias-badge" id="slim-bias">LONG</div>
            
            <div class="slim-details-group">
                <div class="slim-detail">
                    <span>Entry Target</span>
                    <strong id="slim-entry">$0.00</strong>
                </div>
                <div class="slim-separator"></div>
                <div class="slim-detail">
                    <span>Take Profit</span>
                    <strong id="slim-tp" class="text-green">$0.00</strong>
                </div>
                <div class="slim-separator"></div>
                <div class="slim-detail">
                    <span>Stop Loss</span>
                    <strong id="slim-sl" class="text-red">$0.00</strong>
                </div>
            </div>

            <button class="slim-execute-btn" id="slim-exec-btn">Execute Trade</button>
        </div>
    </section>

    <div id="search-modal" class="modal-overlay" onclick="closeSearchModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <input type="text" id="modal-search-input" placeholder="Search 300+ live markets..." onkeyup="renderTokens()">
                <button class="close-btn" onclick="closeSearchModal(event)">✕</button>
            </div>
            
            <div class="modal-list-header">
                <div style="flex: 2;">Market</div>
                <div style="flex: 1; text-align: right;">Price</div>
                <div style="flex: 1; text-align: right;">24h Change</div>
            </div>

            <div class="modal-list" id="modal-token-list">
                <div class="loader-text">Fetching Live Markets Data...</div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
